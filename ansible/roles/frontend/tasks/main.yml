- name: Ensure /opt/stashcloud directory exists
  file:
    path: /opt/stashcloud
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  become: true

- name: Copy docker-compose.yml from project root
  copy:
    src: "{{ playbook_dir }}/../../docker/docker-compose.yml"
    dest: /opt/stashcloud/docker-compose.yml
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Build FQDN from public IP
  set_fact:
    stashcloud_fqdn: "{{ ansible_host | replace('.', '-') }}.sslip.io"

- name: Display FQDN
  debug:
    msg: "FQDN for this instance: {{ stashcloud_fqdn }}"

- name: Deploy HTTP-only Nginx config (for ACME challenge)
  template:
    src: nginx-http-only.conf.j2
    dest: /opt/stashcloud/nginx.conf
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Stop and remove stashcloud frontend stack if it already exists
  community.docker.docker_compose_v2:
    project_src: /opt/stashcloud
    state: absent
  become: true
  ignore_errors: true

- name: Deploy containers with HTTP config
  community.docker.docker_compose_v2:
    project_src: /opt/stashcloud
    pull: always
    state: present
  become: true

- name: Wait for Nginx to be ready
  wait_for:
    port: 80
    delay: 3
    timeout: 30

- name: Obtain TLS certificate with Certbot
  command: >
    docker compose -f /opt/stashcloud/docker-compose.yml
    run --rm certbot certonly
    --webroot
    -w /var/www/certbot
    -d {{ stashcloud_fqdn }}
    --email {{ certbot_email }}
    --agree-tos
    --no-eff-email
    --non-interactive
  register: certbot_result
  no_log: true

- name: Show Certbot output
  debug:
    var: certbot_result.stdout_lines

- name: Deploy HTTPS Nginx config
  template:
    src: nginx.conf.j2
    dest: /opt/stashcloud/nginx.conf
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Restart Nginx with HTTPS config
  command: >
    docker compose -f /opt/stashcloud/docker-compose.yml
    restart nginx
