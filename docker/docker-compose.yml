services:
  filestash:
    image: machines/filestash:latest #no versioning available at the moment (03/26)
    container_name: filestash
    networks:
      - stashnet
    volumes:
      - filestash_data:/app/data/state/
    restart: unless-stopped

    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1
    pids_limit: 200

    logging:
      driver: awslogs
      options:
        awslogs-group: /stashcloud/containers
        awslogs-region: ${AWS_REGION:-eu-west-3}
        awslogs-stream: filestash

  nginx:
    image: nginx:1.28.2-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - filestash
    networks:
      - stashnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro

    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # required to listen on ports 80 and 443
      - CHOWN
      - SETUID
      - SETGID

    read_only: true
    tmpfs:
      - /var/run
      - /tmp
      - /var/cache/nginx  
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 100

    logging:
      driver: awslogs
      options:
        awslogs-group: /stashcloud/containers
        awslogs-region: ${AWS_REGION:-eu-west-3}
        awslogs-stream: nginx

  certbot:
    image: certbot/certbot:v5.4.0
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot

    # Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 50

networks:
  stashnet:
    driver: bridge

volumes:
  filestash_data: {}
  certbot-etc:
  certbot-webroot:
