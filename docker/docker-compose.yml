services:
  filestash:
    image: machines/filestash:latest
    container_name: filestash
    networks:
      - stashnet
    volumes:
      - filestash_data:/app/data/state/
    restart: unless-stopped

    logging:
      driver: awslogs
      options:
        awslogs-group: /stashcloud/containers
        awslogs-region: ${AWS_REGION:-eu-west-3}
        awslogs-create-group: "true"
        awslogs-stream: filestash

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - filestash
    networks:
      - stashnet
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    logging:
      driver: awslogs
      options:
        awslogs-group: /stashcloud/containers
        awslogs-region: ${AWS_REGION:-eu-west-3}
        awslogs-create-group: "true"
        awslogs-stream: nginx

networks:
  stashnet:
    driver: bridge

volumes:
  filestash_data: {}
